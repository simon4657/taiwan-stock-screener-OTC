<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="app-version" content="otc-realtime-breakout-2026-06-18">
    <title>上櫃強勢量價突破策略</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif;
            background: #f4f6f8;
            color: #1f2937;
            padding: 24px;
        }
        .shell { max-width: 1280px; margin: 0 auto; }
        header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 22px;
        }
        h1 { font-size: 28px; margin-bottom: 6px; }
        .subtitle { color: #64748b; line-height: 1.6; }
        .nav-link {
            color: #2563eb;
            text-decoration: none;
            font-weight: 700;
            white-space: nowrap;
            margin-top: 6px;
        }
        .panel {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 18px;
        }
        .rules {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }
        .rule {
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 12px;
            background: #fafafa;
        }
        .rule strong { display: block; margin-bottom: 4px; }
        .rule span { color: #64748b; font-size: 14px; }
        .controls {
            display: grid;
            grid-template-columns: 1fr 180px auto;
            gap: 12px;
            align-items: end;
        }
        .tv-settings {
            margin-top: 12px;
            display: grid;
            gap: 6px;
        }
        .strategy-settings {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }
        .check-row {
            display: flex;
            gap: 12px;
            align-items: center;
            min-height: 41px;
            flex-wrap: wrap;
        }
        .check-row label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            font-weight: 600;
        }
        .check-row input { width: auto; }
        label { display: block; font-weight: 700; margin-bottom: 6px; }
        input {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 11px 12px;
            font-size: 15px;
        }
        button {
            border: 0;
            border-radius: 6px;
            background: #0f172a;
            color: white;
            padding: 12px 18px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        button:disabled { opacity: .55; cursor: not-allowed; }
        .status { color: #475569; line-height: 1.6; }
        .progress-box {
            margin-top: 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #f8fafc;
            padding: 12px;
        }
        .progress-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: #475569;
            font-size: 14px;
            line-height: 1.5;
        }
        .progress-row strong { color: #0f172a; font-size: 16px; }
        .progress-track {
            height: 10px;
            background: #e2e8f0;
            border-radius: 999px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: #2563eb;
            border-radius: 999px;
            transition: width .25s ease;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 12px;
        }
        .stat {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 14px;
        }
        .stat .value { font-size: 24px; font-weight: 800; }
        .stat .label { color: #64748b; font-size: 13px; margin-top: 4px; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 11px 10px;
            border-bottom: 1px solid #e5e7eb;
            text-align: right;
            white-space: nowrap;
            font-size: 14px;
        }
        th:first-child, td:first-child,
        th:nth-child(2), td:nth-child(2) { text-align: left; }
        th { background: #f8fafc; color: #334155; }
        .symbol-link {
            color: #2563eb;
            font-weight: 800;
            text-decoration: none;
        }
        .symbol-link:hover { text-decoration: underline; }
        tr.match { background: #fff7ed; }
        .ok { color: #15803d; font-weight: 800; }
        .bad { color: #b91c1c; font-weight: 800; }
        .empty {
            padding: 30px;
            text-align: center;
            color: #64748b;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }
        .table-wrap { overflow-x: auto; }
        @media (max-width: 820px) {
            body { padding: 14px; }
            header { display: block; }
            .rules, .stats, .controls, .strategy-settings { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header>
            <div>
                <h1>強勢量價突破策略（上櫃市場）</h1>
                <p class="subtitle">依規則：週轉率、量比、均線站上與漲幅四項條件同時成立才列為符合。</p>
            </div>
            <a class="nav-link" href="/">返回主力資金頁</a>
        </header>

        <section class="panel">
            <div class="rules">
                <div class="rule"><strong>TURN 門檻</strong><span>成交量 / 已發行股數 × 100</span></div>
                <div class="rule"><strong>量比門檻</strong><span>今日量 / 前 5 日平均量</span></div>
                <div class="rule"><strong>均線條件</strong><span>可選 MA5 / MA10 / MA20</span></div>
                <div class="rule"><strong>漲幅門檻</strong><span>相對前一交易日收盤</span></div>
            </div>
        </section>

        <section class="panel">
            <div class="strategy-settings">
                <div>
                    <label for="turnoverThreshold">週轉率大於 %</label>
                    <input id="turnoverThreshold" type="number" step="0.1" min="0" value="10">
                </div>
                <div>
                    <label for="volumeRatioThreshold">量比大於</label>
                    <input id="volumeRatioThreshold" type="number" step="0.1" min="0" value="5">
                </div>
                <div>
                    <label for="changeThreshold">漲幅大於 %</label>
                    <input id="changeThreshold" type="number" step="0.1" value="3">
                </div>
                <div>
                    <label>站上均線</label>
                    <div class="check-row">
                        <label><input id="ma5Check" type="checkbox" checked>MA5</label>
                        <label><input id="ma10Check" type="checkbox" checked>MA10</label>
                        <label><input id="ma20Check" type="checkbox" checked>MA20</label>
                    </div>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="controls">
                <div>
                    <label for="codes">指定股票代碼</label>
                    <input id="codes" placeholder="例如：3105, 6488；留空掃描全部上櫃清單">
                </div>
                <div>
                    <label for="limit">最多掃描數</label>
                    <input id="limit" type="number" min="1" placeholder="留空=全部">
                </div>
                <button id="runBtn">開始篩選</button>
            </div>
            <div class="tv-settings">
                <label for="tradingViewChartUrl">TradingView 原有圖表網址</label>
                <input id="tradingViewChartUrl" placeholder="貼上你的圖表網址，例如：https://tw.tradingview.com/chart/AbCdEf12/">
            </div>
            <p class="status" id="statusText">尚未執行。</p>
            <div class="progress-box" id="progressBox" style="display:none;">
                <div class="progress-row">
                    <span id="progressLabel">準備中</span>
                    <strong id="progressPercent">0%</strong>
                </div>
                <div class="progress-track">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-row">
                    <span id="progressCount">0 / 0</span>
                    <span id="progressMessage">等待中</span>
                </div>
            </div>
        </section>

        <section class="stats" id="stats" style="display:none;">
            <div class="stat"><div class="value" id="matchedCount">0</div><div class="label">符合標的</div></div>
            <div class="stat"><div class="value" id="analyzedCount">0</div><div class="label">已分析</div></div>
            <div class="stat"><div class="value" id="requestedCount">0</div><div class="label">請求掃描</div></div>
            <div class="stat"><div class="value" id="missingShares">0</div><div class="label">缺股數跳過</div></div>
            <div class="stat"><div class="value" id="elapsed">0s</div><div class="label">耗時</div></div>
        </section>

        <section class="panel">
            <div id="resultArea" class="empty">篩選結果會顯示在這裡。</div>
        </section>
    </div>

    <script>
        const runBtn = document.getElementById('runBtn');
        const statusText = document.getElementById('statusText');
        const resultArea = document.getElementById('resultArea');
        const stats = document.getElementById('stats');
        const progressBox = document.getElementById('progressBox');
        const progressLabel = document.getElementById('progressLabel');
        const progressPercent = document.getElementById('progressPercent');
        const progressBar = document.getElementById('progressBar');
        const progressCount = document.getElementById('progressCount');
        const progressMessage = document.getElementById('progressMessage');

        function conditionMark(value) {
            return value ? '<span class="ok">OK</span>' : '<span class="bad">NO</span>';
        }

        function numberText(value, digits = 2) {
            if (value === null || value === undefined || Number.isNaN(Number(value))) return '-';
            return Number(value).toLocaleString('zh-TW', { maximumFractionDigits: digits, minimumFractionDigits: digits });
        }

        const TRADING_VIEW_CHART_KEY = 'tradingViewChartUrl';
        const STRATEGY_RULES_KEY = 'realtimeStrategyRules';

        function getTradingViewChartBase() {
            const raw = (localStorage.getItem(TRADING_VIEW_CHART_KEY) || '').trim();
            const match = raw.match(/^https?:\/\/(?:[a-z0-9-]+\.)?tradingview\.com\/chart\/([^/?#]+)/i);
            return match ? `https://tw.tradingview.com/chart/${match[1]}/` : 'https://tw.tradingview.com/chart/';
        }

        function tradingViewUrl(code) {
            return `${getTradingViewChartBase()}?symbol=TPEX:${encodeURIComponent(code)}`;
        }

        function initTradingViewSetting() {
            const input = document.getElementById('tradingViewChartUrl');
            if (!input) return;
            input.value = localStorage.getItem(TRADING_VIEW_CHART_KEY) || '';
            input.addEventListener('change', () => {
                localStorage.setItem(TRADING_VIEW_CHART_KEY, input.value.trim());
            });
        }

        function readNumberInput(id, fallback) {
            const value = Number(document.getElementById(id).value);
            return Number.isFinite(value) ? value : fallback;
        }

        function getStrategyRules() {
            const aboveMa = [];
            if (document.getElementById('ma5Check').checked) aboveMa.push(5);
            if (document.getElementById('ma10Check').checked) aboveMa.push(10);
            if (document.getElementById('ma20Check').checked) aboveMa.push(20);
            return {
                turnover_rate_gt: readNumberInput('turnoverThreshold', 10),
                volume_ratio_gt: readNumberInput('volumeRatioThreshold', 5),
                change_percent_gt: readNumberInput('changeThreshold', 3),
                above_ma: aboveMa,
            };
        }

        function saveStrategyRules() {
            localStorage.setItem(STRATEGY_RULES_KEY, JSON.stringify(getStrategyRules()));
        }

        function initStrategySettings() {
            try {
                const saved = JSON.parse(localStorage.getItem(STRATEGY_RULES_KEY) || '{}');
                if (Number.isFinite(Number(saved.turnover_rate_gt))) document.getElementById('turnoverThreshold').value = saved.turnover_rate_gt;
                if (Number.isFinite(Number(saved.volume_ratio_gt))) document.getElementById('volumeRatioThreshold').value = saved.volume_ratio_gt;
                if (Number.isFinite(Number(saved.change_percent_gt))) document.getElementById('changeThreshold').value = saved.change_percent_gt;
                if (Array.isArray(saved.above_ma)) {
                    document.getElementById('ma5Check').checked = saved.above_ma.includes(5);
                    document.getElementById('ma10Check').checked = saved.above_ma.includes(10);
                    document.getElementById('ma20Check').checked = saved.above_ma.includes(20);
                }
            } catch (error) {
                localStorage.removeItem(STRATEGY_RULES_KEY);
            }
            ['turnoverThreshold', 'volumeRatioThreshold', 'changeThreshold', 'ma5Check', 'ma10Check', 'ma20Check']
                .forEach(id => document.getElementById(id).addEventListener('change', saveStrategyRules));
        }

        function renderTable(rows) {
            if (!rows.length) {
                resultArea.className = 'empty';
                resultArea.innerHTML = '沒有符合四項條件的上櫃標的。';
                return;
            }
            resultArea.className = 'table-wrap';
            resultArea.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>代碼</th>
                            <th>名稱</th>
                            <th>現價</th>
                            <th>漲幅%</th>
                            <th>週轉率%</th>
                            <th>量比</th>
                            <th>MA5</th>
                            <th>MA10</th>
                            <th>MA20</th>
                            <th>TURN</th>
                            <th>量比</th>
                            <th>均線</th>
                            <th>漲幅</th>
                            <th>日期</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.map(row => `
                            <tr class="${row.matched ? 'match' : ''}">
                                <td><a class="symbol-link" href="${tradingViewUrl(row.code)}" target="_blank" rel="noopener noreferrer">${row.code}</a></td>
                                <td>${row.name}</td>
                                <td>${numberText(row.price)}</td>
                                <td>${numberText(row.change_percent)}</td>
                                <td>${numberText(row.turnover_rate)}</td>
                                <td>${numberText(row.volume_ratio)}</td>
                                <td>${numberText(row.ma5)}</td>
                                <td>${numberText(row.ma10)}</td>
                                <td>${numberText(row.ma20)}</td>
                                <td>${conditionMark(row.conditions.turnover)}</td>
                                <td>${conditionMark(row.conditions.volume_ratio)}</td>
                                <td>${conditionMark(row.conditions.above_ma)}</td>
                                <td>${conditionMark(row.conditions.change)}</td>
                                <td>${row.date || '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function updateProgress(job) {
            const total = Number(job.total || 0);
            const progress = Number(job.progress || 0);
            const percent = total > 0 ? Math.min(100, Number(job.percent || (progress / total * 100))) : Number(job.percent || 0);
            progressBox.style.display = 'block';
            progressLabel.textContent = job.is_running ? '篩選進行中' : '篩選完成';
            progressPercent.textContent = `${percent.toFixed(percent % 1 === 0 ? 0 : 1)}%`;
            progressBar.style.width = `${percent}%`;
            progressCount.textContent = `${progress.toLocaleString()} / ${total.toLocaleString()}`;
            progressMessage.textContent = job.message || '正在處理...';
        }

        function applyResult(data) {
            document.getElementById('matchedCount').textContent = data.matched_count.toLocaleString();
            document.getElementById('analyzedCount').textContent = data.total_analyzed.toLocaleString();
            document.getElementById('requestedCount').textContent = data.total_requested.toLocaleString();
            document.getElementById('missingShares').textContent = data.skipped_missing_shares.toLocaleString();
            document.getElementById('elapsed').textContent = `${data.elapsed_seconds}s`;
            stats.style.display = 'grid';
            statusText.textContent = `完成。符合 ${data.matched_count} 支，已分析 ${data.total_analyzed} 支上櫃股票。`;
            renderTable(data.matched_stocks);
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function pollRealtimeJob(jobId) {
            while (true) {
                const response = await fetch(`/api/realtime_status/${encodeURIComponent(jobId)}`);
                const job = await response.json();
                if (!response.ok || !job.success) {
                    throw new Error(job.error || '查詢進度失敗');
                }
                updateProgress(job);
                if (!job.is_running) {
                    if (job.error) throw new Error(job.error);
                    if (!job.result) throw new Error('篩選完成但沒有結果資料');
                    return job.result;
                }
                await sleep(1200);
            }
        }

        runBtn.addEventListener('click', async () => {
            const codes = document.getElementById('codes').value
                .split(/[,\s，]+/)
                .map(item => item.trim())
                .filter(Boolean);
            const limitValue = document.getElementById('limit').value;
            const body = {};
            if (codes.length) body.stock_codes = codes;
            if (limitValue) body.limit = Number(limitValue);
            body.rules = getStrategyRules();
            if (!body.rules.above_ma.length) {
                statusText.textContent = '請至少選擇一條均線條件。';
                return;
            }
            saveStrategyRules();

            runBtn.disabled = true;
            statusText.textContent = '正在抓取上櫃即時報價與歷史均線資料...';
            progressBox.style.display = 'block';
            updateProgress({ progress: 0, total: 0, percent: 0, message: '正在建立篩選任務...', is_running: true });
            resultArea.className = 'empty';
            resultArea.textContent = '篩選中，請稍候。掃描全部上櫃股票可能需要數分鐘。';

            try {
                const response = await fetch('/api/realtime_screen', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const startData = await response.json();
                if (!response.ok || !startData.success) throw new Error(startData.error || '篩選失敗');

                const data = startData.async ? await pollRealtimeJob(startData.job_id) : startData;
                applyResult(data);
            } catch (error) {
                statusText.textContent = `錯誤：${error.message}`;
                resultArea.className = 'empty';
                resultArea.textContent = '篩選失敗，請稍後再試。';
            } finally {
                runBtn.disabled = false;
            }
        });
        document.addEventListener('DOMContentLoaded', () => {
            initTradingViewSetting();
            initStrategySettings();
        });
    </script>
</body>
</html>
